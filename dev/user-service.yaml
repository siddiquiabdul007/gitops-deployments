apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-stable
  labels:
    app: user-service
    version: stable

spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: user-service
      version: stable

  template:
    metadata:
      labels:
        app: user-service
        version: stable

    spec:
      containers:
      - name: user-service
        image: devopsdevacr7583.azurecr.io/user-service:a7c9bf7
        imagePullPolicy: Always

        ports:
        - containerPort: 3001

        env:
        - name: PORT
          value: "3001"

        resources:
          requests:
            cpu: "10m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 15

        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  type: ClusterIP

  selector:
    app: user-service
    version: stable

  ports:
  - port: 80
    targetPort: 3001

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service-stable   # ⚠️ UPDATED

  minReplicas: 3
  maxReplicas: 5

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 1